<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小牛育儿 30 天推广指挥台</title>
<style>
:root {
  --bg: #fcf8f3;
  --panel: rgba(255,251,246,0.92);
  --panel2: rgba(248,244,240,0.9);
  --line: rgba(83,48,29,0.08);
  --text: #3f261b;
  --muted: #7d5d4d;
  --accent: #cb6f3f;
  --accent-soft: #f4b487;
  --accent-deep: #9f4f2f;
  --good: #486b4d;
  --blue: #3a6b8f;
  --purple: #7b5ea7;
  --gold: #b8860b;
  --rose: #b85060;
  --radius: 16px;
  --radius-sm: 10px;
  --sans: "Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --serif: "Noto Serif SC","Songti SC",serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: var(--sans); color: var(--text);
  background: radial-gradient(circle at top left, rgba(255,214,180,0.6), transparent 30%),
              radial-gradient(circle at top right, rgba(255,236,190,0.5), transparent 25%),
              linear-gradient(180deg, #fcf6ef 0%, #f5eadb 50%, #efe0cc 100%);
  min-height: 100vh;
}
.shell { max-width: 1480px; margin:0 auto; padding: 24px 28px; }

/* ── top bar ── */
.topbar {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  padding: 14px 22px; border-radius: var(--radius); margin-bottom: 20px;
  background: var(--panel); border: 1px solid var(--line);
}
.topbar .logo { font-family: var(--serif); font-size: 20px; font-weight: 700; white-space: nowrap; }
.topbar .tagline { color: var(--muted); font-size: 13px; flex:1; min-width: 200px; }
.topbar .quick-stat { font-size: 12px; color: var(--muted); white-space: nowrap; }
.topbar .quick-stat b { color: var(--accent); }
.progress-mini { display:flex; align-items:center; gap:8px; margin-left: auto; }
.progress-mini .bar { width:120px; height:6px; border-radius:99px; background:rgba(203,111,63,0.1); overflow:hidden; }
.progress-mini .bar .fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent-soft),var(--accent)); transition:width .4s; }
.topbar .btn-group { display:flex; gap:6px; flex-wrap:wrap; }
.topbar .btn-sm {
  padding:6px 12px; border-radius:99px; font-size:11px; font-weight:600; cursor:pointer;
  border:1px solid var(--line); background:rgba(255,255,255,0.7); color: var(--text);
  transition: border-color .18s;
}
.topbar .btn-sm:hover { border-color: var(--accent); }

/* ── main grid: left sidebar + center + right tools ── */
.main { display:grid; grid-template-columns:220px 1fr 280px; gap:20px; align-items:start; }

/* ── left sidebar ── */
.side-left { display:flex; flex-direction:column; gap:16px; position:sticky; top:20px; }
.side-card {
  background: var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px; overflow:hidden;
}
.side-card h3 { font-size:12px; font-weight:700; color: var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.08em; }

/* calendar grid */
.cal-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.cal-cell {
  aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-radius:10px; cursor:pointer; font-size:11px; font-weight:700; border:1px solid transparent;
  transition: all .18s; position:relative;
}
.cal-cell .num { font-size:13px; }
.cal-cell .dot { width:6px; height:6px; border-radius:50%; margin-top:2px; background:rgba(0,0,0,0.12); }
.cal-cell.done .dot { background:var(--good); }
.cal-cell.w1 { background:rgba(203,111,63,0.06); }
.cal-cell.w2 { background:rgba(72,107,77,0.06); }
.cal-cell.w3 { background:rgba(184,134,11,0.06); }
.cal-cell.w4 { background:rgba(123,94,167,0.06); }
.cal-cell.w5 { background:rgba(184,80,96,0.06); }
.cal-cell:hover { transform:scale(1.08); border-color:var(--accent); }
.cal-cell.active { border-color:var(--accent); background:rgba(203,111,63,0.12); box-shadow:0 0 0 2px rgba(203,111,63,0.2); }
.cal-week-label { grid-column:span 5; font-size:10px; color:var(--muted); padding:4px 0 0; text-align:center; border-top:1px solid var(--line); margin-top:2px; }

/* funnel */
.funnel-bar { margin:4px 0 10px; }
.funnel-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12px; }
.funnel-row .label { width:44px; color:var(--muted); text-align:right; flex-shrink:0; }
.funnel-row .track { flex:1; height:8px; border-radius:99px; background:rgba(0,0,0,0.06); overflow:hidden; }
.funnel-row .track .fill { height:100%; border-radius:99px; }
.funnel-row .track .fill.f1 { background:linear-gradient(90deg,#f4b487,#cb6f3f); }
.funnel-row .track .fill.f2 { background:linear-gradient(90deg,#86b38a,#486b4d); }
.funnel-row .track .fill.f3 { background:linear-gradient(90deg,#c4a6e0,#7b5ea7); }
.funnel-row .val { font-size:11px; font-weight:700; width:52px; flex-shrink:0; }
.funnel-input { display:flex; gap:6px; margin-top:8px; }
.funnel-input input { flex:1; padding:6px 8px; border:1px solid var(--line); border-radius:8px; font-size:11px; }
.funnel-input button { padding:6px 10px; border-radius:8px; font-size:11px; cursor:pointer; border:none; background:var(--accent); color:#fff; font-weight:600; }

/* ── center: today's mission ── */
.center { display:flex; flex-direction:column; gap:16px; }
.mission-header {
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:16px 20px; border-radius:var(--radius);
  background: var(--panel); border:1px solid var(--line);
}
.mission-header .day-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:48px; height:48px; border-radius:50%; font-size:18px; font-weight:700; color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-deep));
}
.mission-header .info { flex:1; }
.mission-header .info .title { font-family:var(--serif); font-size:18px; font-weight:700; }
.mission-header .info .sub { font-size:12px; color:var(--muted); margin-top:2px; }
.mission-header .cta-chip {
  padding:6px 14px; border-radius:99px; font-size:12px; font-weight:700;
  background:rgba(203,111,63,0.1); color:var(--accent);
}

/* task cards */
.task-card {
  background: var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 20px; transition: border-color .18s;
}
.task-card:hover { border-color: rgba(203,111,63,0.2); }
.task-card .task-head {
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
}
.task-card .task-head .icon { font-size:20px; }
.task-card .task-head .label { font-size:13px; font-weight:700; }
.task-card .task-head .actions { margin-left:auto; display:flex; gap:6px; }
.task-card .task-body {
  background:rgba(253,248,240,0.7); border:1px solid rgba(203,111,63,0.06);
  border-radius:var(--radius-sm); padding:14px; font-size:13px; line-height:1.8;
  white-space: pre-wrap; max-height: 200px; overflow-y:auto; margin-bottom:10px;
}
.task-card .task-body strong { font-family:var(--serif); }
.task-card .task-foot { display:flex; align-items:center; gap:10px; }
.task-card .task-foot .toggle {
  display:inline-flex; align-items:center; gap:4px; padding:5px 12px;
  border-radius:99px; font-size:11px; font-weight:600; cursor:pointer;
  border:1px solid var(--line); background:#fff; transition: all .18s;
}
.task-card .task-foot .toggle.done {
  background:rgba(72,107,77,0.1); border-color: var(--good); color: var(--good);
}

/* rec images inline */
.rec-row { display:flex; gap:8px; flex-wrap:wrap; }
.rec-chip {
  padding:5px 12px; border-radius:99px; font-size:11px; font-weight:600; cursor:pointer;
  border:1px solid rgba(203,111,63,0.15); background:rgba(203,111,63,0.04); color:var(--accent-deep);
  transition: background .18s;
}
.rec-chip:hover { background:rgba(203,111,63,0.12); }

/* metrics row */
.metrics-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px; }
.metrics-row input {
  padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:12px;
  background:rgba(255,255,255,0.7);
}
.metrics-row input::placeholder { color:var(--muted); }

/* ── right tools ── */
.side-right { display:flex; flex-direction:column; gap:16px; position:sticky; top:20px; max-height:calc(100vh - 40px); overflow-y:auto; scrollbar-width:thin; scrollbar-color:rgba(203,111,63,0.2) transparent; }
.asset-grid-mini { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
.asset-chip {
  padding:8px; border-radius:10px; text-align:center; cursor:pointer; font-size:11px;
  border:1px solid var(--line); background:rgba(255,255,255,0.6); text-decoration:none; color:inherit;
  transition: border-color .18s, background .18s;
}
.asset-chip:hover { border-color:var(--accent); background:rgba(255,248,240,0.85); }
.asset-chip .aicon { font-size:20px; }
.asset-chip .aname { font-weight:700; margin-top:2px; }

/* collapsible */
.collapse { border:1px solid var(--line); border-radius:var(--radius); background:var(--panel2); overflow:hidden; }
.collapse summary {
  list-style:none; cursor:pointer; padding:14px 18px; font-size:13px; font-weight:700;
  display:flex; align-items:center; gap:8px;
}
.collapse summary::-webkit-details-marker { display:none; }
.collapse .body { padding:0 18px 18px; line-height:1.8; font-size:12px; }
.collapse .body h3,.collapse .body h4 { margin-top:14px; margin-bottom:6px; }
.collapse .body ul,.collapse .body ol { margin:8px 0 0 20px; }
.collapse .body code { background:rgba(203,111,63,0.08); padding:1px 4px; border-radius:4px; font-size:11px; }
.collapse .body pre { overflow:auto; padding:12px; border-radius:10px; background:#fff6ee; border:1px solid var(--line); font-size:11px; }
.collapse .body table { width:100%; border-collapse:collapse; font-size:11px; margin:8px 0; }
.collapse .body th,.collapse .body td { padding:6px 8px; border:1px solid var(--line); text-align:left; vertical-align:top; }

.footer { text-align:center; color:var(--muted); font-size:12px; margin-top:24px; }

@media (max-width:1280px) {
  .main { grid-template-columns:1fr; }
  .side-left, .side-right { position:static; max-height:none; }
  .cal-grid { grid-template-columns:repeat(10,1fr); }
  .cal-week-label { display:none; }
  .metrics-row { grid-template-columns:repeat(2,1fr); }
}
@media (max-width:700px) {
  .shell { padding:12px; }
  .topbar { flex-direction:column; align-items:flex-start; }
  .cal-grid { grid-template-columns:repeat(5,1fr); }
  .metrics-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- ═══ TOP BAR ═══ -->
  <div class="topbar">
    <span class="logo">🎯 小牛育儿 30 天推广指挥台</span>
    <span class="tagline" id="topTagline">加载中...</span>
    <span class="quick-stat">已完成 <b id="topDone">0/120</b></span>
    <div class="progress-mini">
      <div class="bar"><div class="fill" id="topFill" style="width:0%"></div></div>
      <span style="font-size:12px;font-weight:700;" id="topPct">0%</span>
    </div>
    <div class="btn-group">
      <button class="btn-sm" id="exportMdBtn">📥 导出报告</button>
      <button class="btn-sm" id="exportCsvBtn">📊 导出 CSV</button>
      <button class="btn-sm" id="exportSummaryBtn">📋 复制摘要</button>
    </div>
  </div>

  <!-- ═══ MAIN GRID ═══ -->
  <div class="main">

    <!-- ═══ LEFT: CALENDAR + FUNNEL ═══ -->
    <div class="side-left">
      <div class="side-card">
        <h3>📅 执行日历</h3>
        <div id="calGrid" class="cal-grid"></div>
      </div>

      <div class="side-card">
        <h3>📊 转化漏斗</h3>
        <div class="funnel-bar">
          <div class="funnel-row">
            <span class="label">触达</span><div class="track"><div class="fill f1" id="funnelReach" style="width:0%"></div></div>
            <span class="val" id="funnelReachVal">0/3000</span>
          </div>
          <div class="funnel-row">
            <span class="label">注册</span><div class="track"><div class="fill f2" id="funnelReg" style="width:0%"></div></div>
            <span class="val" id="funnelRegVal">0/1500</span>
          </div>
          <div class="funnel-row">
            <span class="label">付费</span><div class="track"><div class="fill f3" id="funnelPay" style="width:0%"></div></div>
            <span class="val" id="funnelPayVal">0</span>
          </div>
        </div>
        <div class="funnel-input">
          <input id="funnelRegInput" type="number" min="0" placeholder="今日注册" />
          <input id="funnelPayInput" type="number" min="0" placeholder="今日付费" />
          <button id="funnelSaveBtn">记</button>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:6px;">触达=已发私聊人数，注册/付费累计</div>
      </div>
    </div>

    <!-- ═══ CENTER: TODAY'S MISSION ═══ -->
    <div class="center" id="centerColumn">
      <div class="mission-header">
        <div class="day-badge" id="missionDay">1</div>
        <div class="info">
          <div class="title" id="missionTitle">Day 1 · 选择一天开始</div>
          <div class="sub" id="missionSub">点击左侧日历卡片加载内容</div>
        </div>
        <span class="cta-chip" id="missionCta">-</span>
      </div>

      <div id="taskCards"></div>
    </div>

    <!-- ═══ RIGHT: TOOLS ═══ -->
    <div class="side-right">
      <div class="side-card">
        <h3>🖼 配图素材</h3>
        <div id="assetGrid" class="asset-grid-mini"></div>
      </div>

      <details class="collapse">
        <summary>💬 话术库</summary>
        <div class="body" id="libraryBody"></div>
      </details>

      <details class="collapse">
        <summary>📖 文档总览</summary>
        <div class="body" id="overviewBody"></div>
      </details>

      <details class="collapse">
        <summary>📚 完整内容中心</summary>
        <div class="body" id="contentBody"></div>
      </details>
    </div>
  </div>

  <div class="footer">数据保存在浏览器本地。修改同目录 Markdown 后刷新页面即可同步。</div>
</div>

<script>
const mdPath = "./marketing-plan-interactive.md";
const STORE = "niuniu-marketing-plan-v2";
const state = { sections:{}, days:[], selectedDay:1, progress: loadProgress(), funnel: loadFunnel() };
const baseUrl = location.href.replace(/marketing-plan-interactive\.html.*$/,"");

const ovIds = ["1. 目标与原则","2. 产品卖点与对外口径","3. 目标人群与四条内容主线","4. 单人执行工作流","5. 30 天总日历","19. 发布SOP与每日执行清单","20. 素材清单与复盘表"];
const ctIds = ["6. 小红书 30 条详细内容计划与提示词","8. 公众号 8 篇详细选题","15. 30 条小红书可直接发布版","16. 30 条抖音口播逐字稿版","24. 小程序模块卖点矩阵与营销切题方向","25. 按模块拆的 50 个内容选题标题库","26. 50 个标题对应的首句钩子库","27. 生活场景扩展开选题库（备用 30 条）"];
const lbIds = ["10. 海报与封面提示词","21. 评论区回复库与私信承接话术","22. 异议处理与转化收口话术","23. 3000 会员分批触达排期与执行表"];

const assets = [
  { id:"01",name:"首页聚合",icon:"🏠",scenes:["all"],file:"pages/01-home.html" },
  { id:"02",name:"AI育儿问答",icon:"💬",scenes:["专注","表达","吃饭","睡眠","阅读","训练"],file:"pages/02-ai-chat.html" },
  { id:"03",name:"成长观察",icon:"🔍",scenes:["专注","表达","训练"],file:"pages/03-assessment.html" },
  { id:"04",name:"每日训练",icon:"🏋",scenes:["专注","表达","阅读","训练"],file:"pages/04-daily-training.html" },
  { id:"05",name:"营养食谱",icon:"🍲",scenes:["吃饭"],file:"pages/05-nutrition.html" },
  { id:"06",name:"育儿锦囊",icon:"📖",scenes:["睡眠","阅读"],file:"pages/06-parenting.html" },
  { id:"07",name:"成长记录",icon:"📈",scenes:["专注","表达","训练"],file:"pages/07-growth-record.html" },
  { id:"08",name:"每周总结",icon:"📊",scenes:["转化"],file:"pages/08-weekly-summary.html" },
  { id:"09",name:"会员中心",icon:"⭐",scenes:["转化"],file:"pages/09-membership.html" },
  { id:"10",name:"个人中心",icon:"👤",scenes:["转化"],file:"pages/10-profile.html" },
];
const sceneFeat = {
  "专注":{cls:"focus",feat:["02","03","04","07"]},
  "表达":{cls:"express",feat:["02","03","04","07"]},
  "吃饭":{cls:"eat",feat:["02","05"]},
  "睡眠":{cls:"sleep",feat:["02","06"]},
  "阅读":{cls:"read",feat:["02","04","06"]},
  "训练":{cls:"train",feat:["02","03","04","07"]},
  "转化":{cls:"convert",feat:["08","09","10","01"]},
};

// ── init ──
init();
async function init() {
  try {
    const r = await fetch(mdPath);
    if(!r.ok) throw new Error(`读取 Markdown 失败: ${r.status}`);
    state.sections = splitSections(await r.text());
    state.days = buildDays(state.sections);
    document.getElementById("topTagline").textContent = extractTagline(state.sections["2. 产品卖点与对外口径"]||"")||"看懂孩子当前成长短板，少走弯路，带娃更省心";
    renderCal(); renderDetail(state.selectedDay); renderAsset(); renderLib(); renderOv(); renderCt(); renderFunnel(); updateTop();
  } catch(e) {
    document.getElementById("centerColumn").innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);">${e.message}<br>请通过本地静态服务或平台预览打开。</div>`;
  }
}

// ── MD parsing ──
function splitSections(md) {
  const s={}; const re=/^##\s+(.+)$/gm; const m=[...md.matchAll(re)];
  m.forEach((x,i)=>{const t=x[1].trim(),st=x.index+x[0].length,en=i+1<m.length?m[i+1].index:md.length;s[t]=md.slice(st,en).trim();});
  return s;
}
function buildDays(ss) {
  const pm=parsePrompts(ss["6. 小红书 30 条详细内容计划与提示词"]||"");
  const xm=parseDayBlocks(ss["15. 30 条小红书可直接发布版"]||"",["标题","正文"]);
  const vm=parseDayBlocks(ss["16. 30 条抖音口播逐字稿版"]||"",["标题","口播"]);
  const cm=parseCover(ss["17. 30 条小红书封面大标题与配图文案"]||"");
  const rm=parseNumQuotes(ss["18. 30 天会员私聊逐日发送模板"]||"");
  return Array.from({length:30},(_,i)=>{
    const d=i+1,w=getWeek(d),sc=getScene(d);
    const p=pm[d]||{topic:`Day ${d}`,prompt:""};
    const x=xm[d]||{标题:`Day ${d}`,正文:""};
    const v=vm[d]||{标题:`Day ${d}`,口播:""};
    const c=cm[d]||{title:x.标题||`Day ${d}`,subtitle:""};
    return {day:d,week:w,scene:sc,cta:getCta(d),promptTopic:p.topic||`Day ${d}`,promptText:p.prompt||"",xhsTitle:x.标题||`Day ${d}`,xhsBody:x.正文||"",videoTitle:v.标题||`Day ${d}`,videoScript:v.口播||"",coverTitle:c.title||"",coverSubtitle:c.subtitle||"",reach:rm[d]||""};
  });
}
function parseDayBlocks(sec,fields) {
  const b={}; const re=/### Day (\d+)([\s\S]*?)(?=\n### Day \d+|$)/g; let m;
  while((m=re.exec(sec))){const d=+m[1],bl=m[2],r={};fields.forEach(f=>{const fr=new RegExp("- "+f+"：`([\\s\\S]*?)`(?=\\n- |$)");const fm=bl.match(fr);r[f]=fm?clv(fm[1]):"";});b[d]=r;}
  return b;
}
function parsePrompts(sec) {
  const b={}; const re=/### Day (\d+)([\s\S]*?)(?=\n### Day \d+|$)/g; let m;
  while((m=re.exec(sec))){const d=+m[1],bl=m[2],t=bl.match(/- 选题：`([^`]+)`/),p=bl.match(/- AI 提示词：[\s\S]*?```text\n([\s\S]*?)```/);b[d]={topic:t?t[1].trim():`Day ${d}`,prompt:p?p[1].trim():""};}
  return b;
}
function parseCover(sec) {
  const b={}; const re=/(\d+)\. 主标题：`([^`]+)`\s+副标题：`([^`]+)`/g; let m;
  while((m=re.exec(sec))) b[+m[1]]={title:m[2].trim(),subtitle:m[3].trim()};
  return b;
}
function parseNumQuotes(sec) {
  const b={}; const re=/(\d+)\.\s*`([^`]+)`/g; let m;
  while((m=re.exec(sec))) b[+m[1]]=m[2].trim();
  return b;
}
function clv(v){return v.replace(/^`|`$/g,"").replace(/\n+/g,"\n").trim();}
function getWeek(d){return d<=7?"第1周":d<=14?"第2周":d<=21?"第3周":d<=28?"第4周":"第5周";}
function getScene(d){return d<=7?"专注":d<=14?"表达":d<=17?"吃饭":d<=21?(d===18||d===19?"睡眠":"吃饭"):d<=24?"阅读":d<=28?"训练":"转化";}
function getSceneCls(sc){const m={专注:"focus",表达:"express",吃饭:"eat",睡眠:"sleep",阅读:"read",训练:"train",转化:"convert"};return m[sc]||"focus";}
function getWeekCls(d){return d<=7?"w1":d<=14?"w2":d<=21?"w3":d<=28?"w4":"w5";}
function getCta(d){if(d===7||d===14||d===21||d===28||d===30)return"领 7 天服务";if(d>=25&&d<=27)return"先试 10 分钟";if(d===29)return"先做成长观察";return d%2===0?"先看短板":"先做成长观察";}

// ── progress / funnel ──
function getProgress(day) { if(!state.progress[day]) state.progress[day]={tasks:{xhs:false,video:false,reach:false,review:false},metrics:{}}; return state.progress[day]; }
function isDone(p){return Object.values(p.tasks).every(Boolean);}
function loadProgress(){try{return JSON.parse(localStorage.getItem(STORE+"-prog")||"{}");}catch{return{};}}
function saveProgress(){localStorage.setItem(STORE+"-prog",JSON.stringify(state.progress));}
function loadFunnel(){try{return JSON.parse(localStorage.getItem(STORE+"-funnel")||'{"reach":0,"reg":0,"pay":0}');}catch{return{reach:0,reg:0,pay:0};}}
function saveFunnel(){localStorage.setItem(STORE+"-funnel",JSON.stringify(state.funnel));}
function updateFunnelReach(){let c=0;state.days.forEach(d=>{if(getProgress(d.day).tasks.reach)c+=100;});state.funnel.reach=Math.min(c,3000);saveFunnel();renderFunnel();}

// ── render ──
function renderCal() {
  const el=document.getElementById("calGrid");
  let h=""; let lastWk="";
  state.days.forEach(d=>{
    if(d.week!==lastWk){if(lastWk) h+=`<div class="cal-week-label">${lastWk}</div>`;lastWk=d.week;}
    const p=getProgress(d.day),dn=isDone(p),sel=d.day===state.selectedDay;
    h+=`<div class="cal-cell ${getWeekCls(d.day)} ${dn?"done":""} ${sel?"active":""}" onclick="selectDay(${d.day})" title="Day ${d.day} · ${d.scene}">
      <span class="num">${d.day}</span><span class="dot"></span>
    </div>`;
  });
  if(lastWk) h+=`<div class="cal-week-label">${lastWk}</div>`;
  el.innerHTML=h;
}

  });

      <div class="rec-row">${recs.map(a=>`<span class="rec-chip" onclick="window.open('${baseUrl}${a.file}','_blank')">${a.icon} ${a.name}</span>`).join("")}</div>
    </div>`;
  }

  // metrics
  html+=`<div class="task-card">
    <div class="task-head"><span class="icon">📊</span><span class="label">今日数据</span><span class="actions"><button class="btn-sm" onclick="saveMetrics()">保存</button></span></div>
    <div class="metrics-row">
      <input id="mViews" type="number" min="0" placeholder="小红书浏览" value="${p.metrics.views||""}" />
      <input id="mSaves" type="number" min="0" placeholder="收藏量" value="${p.metrics.saves||""}" />
      <input id="mPlays" type="number" min="0" placeholder="视频播放" value="${p.metrics.plays||""}" />
      <input id="mEnt" type="number" min="0" placeholder="小程序进入" value="${p.metrics.entrances||""}" />
      <input id="mRepl" type="number" min="0" placeholder="会员回复" value="${p.metrics.replies||""}" />
      <input id="mHi" type="number" min="0" placeholder="高意向" value="${p.metrics.highIntent||""}" />
    </div>
    <textarea id="mNote" placeholder="复盘备注..." style="width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:12px;min-height:60px;resize:vertical;">${p.metrics.note||""}</textarea>
  </div>`;

  document.getElementById("taskCards").innerHTML=html;

function renderAsset() {
  document.getElementById("assetGrid").innerHTML=assets.map(a=>`
    <a class="asset-chip" href="${baseUrl}${a.file}" target="_blank" title="${a.name}">
      <div class="aicon">${a.icon}</div><div class="aname">${a.name}</div>

function renderLib() { document.getElementById("libraryBody").innerHTML=lbIds.map(id=>buildCollapse(id,state.sections[id]||"")).join(""); }
function renderOv() { document.getElementById("overviewBody").innerHTML=ovIds.map(id=>buildCollapse(id,state.sections[id]||"")).join(""); }

function buildCollapse(title,md) {
  if(!md) return `<p style="color:var(--muted)">${esc(title)} 暂无内容</p>`;
  return `<div style="margin-bottom:14px;"><h4 style="margin-bottom:6px;">${esc(title)}</h4><div style="font-size:12px;line-height:1.8;">${mdToHtml(md)}</div></div>`;
}

function renderFunnel() {
  const f=state.funnel;
  document.getElementById("funnelReach").style.width=Math.min(f.reach/3000*100,100)+"%";
  document.getElementById("funnelReg").style.width=Math.min(f.reg/1500*100,100)+"%";
  document.getElementById("funnelPay").style.width=Math.min(f.pay/500*100,100)+"%";
  document.getElementById("funnelReachVal").textContent=f.reach+"/3000";
  document.getElementById("funnelRegVal").textContent=f.reg+"/1500";
  document.getElementById("funnelPayVal").textContent=f.pay;

function updateTop() {
  const tot=state.days.length*4; let c=0;
  state.days.forEach(d=>{Object.values(getProgress(d.day).tasks).forEach(v=>{if(v)c++;});});
  const pct=Math.round(c/tot*100);
  document.getElementById("topDone").textContent=`${c}/${tot}`;
  document.getElementById("topPct").textContent=pct+"%";
  document.getElementById("topFill").style.width=pct+"%";
  updateFunnelReach();
}

// ── actions ──
function selectDay(dn) { renderDetail(dn); }
function toggleTask(task) {
  const d=state.days.find(x=>x.day===state.selectedDay);

  const d=state.days.find(x=>x.day===state.selectedDay);

  const ri=parseInt(document.getElementById("funnelRegInput").value)||0;

function exportCsv() {
  const rows=[["Day","周次","场景","CTA","小红书标题","视频标题","小红书","视频","触达","复盘","浏览","收藏","播放","小程序进入","会员回复","高意向","备注"]];

function exportSummary() {
  const lines=["[小牛育儿 30 天推广执行摘要]"];let c=0;const tot=state.days.length*4;
  state.days.forEach(d=>{Object.values(getProgress(d.day).tasks).forEach(v=>{if(v)c++;});});

  lines.push(`转化漏斗：触达${state.funnel.reach}/3000 注册${state.funnel.reg}/1500 付费${state.funnel.pay}`);

  lines.push("");lines.push("--- 待推进天 ---");

// ── md→html ──
function mdToHtml(md) {
  const cbs=[];let s=esc(md).replace(/```([\s\S]*?)```/g,(_,c)=>{cbs.push(`<pre><code>${c.trim()}</code></pre>`);return`@@CB${cbs.length-1}@@`;});
  const ls=s.split("\n");let h="",ul=false,ol=false,tb=[];
  const fl=()=>{if(ul){h+="</ul>";ul=false;}if(ol){h+="</ol>";ol=false;}};
  const ft=()=>{if(!tb.length)return;const rs=tb.map(l=>l.split("|").slice(1,-1).map(c=>c.trim())),hd=rs[0]||[],bd=rs.slice(2);h+="<table><thead><tr>"+hd.map(c=>`<th>${imd(c)}</th>`).join("")+"</tr></thead><tbody>";bd.forEach(r=>{h+="<tr>"+r.map(c=>`<td>${imd(c)}</td>`).join("")+"</tr>";});h+="</tbody></table>";tb=[];};
  ls.forEach(l=>{if(/^\|.*\|$/.test(l.trim())){fl();tb.push(l.trim());return;}ft();if(!l.trim()){fl();h+='<div style="height:6px"></div>';return;}
    if(l.startsWith("#### ")){fl();h+=`<h4>${imd(l.slice(5))}</h4>`;return;}
    if(l.startsWith("### ")){fl();h+=`<h3>${imd(l.slice(4))}</h3>`;return;}
    if(/^- /.test(l)){if(!ul){fl();h+="<ul>";ul=true;}h+=`<li>${imd(l.replace(/^-\s+/,""))}</li>`;return;}
    if(/^\d+\. /.test(l)){if(!ol){fl();h+="<ol>";ol=true;}h+=`<li>${imd(l.replace(/^\d+\.\s+/,""))}</li>`;return;}
    fl();h+=`<p>${imd(l)}</p>`;});
  fl();ft();
  return h.replace(/@@CB(\d+)@@/g,(_,i)=>cbs[+i]||"");
}
function imd(t){return t.replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");}
function esc(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

async function copyText(t) {
  if(!t)return;
  try{await navigator.clipboard.writeText(t);}catch{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
}

window.selectDay=selectDay;
window.toggleTask=toggleTask;
window.copyField=copyField;
window.saveMetrics=saveMetrics;
