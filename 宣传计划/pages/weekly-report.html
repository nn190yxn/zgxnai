<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" /><title>每周成长总结</title><style>*{box-sizing:border-box;margin:0;padding:0}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(circle at top left,rgba(255,214,180,.8),transparent 28%),radial-gradient(circle at top right,rgba(255,236,190,.7),transparent 22%),linear-gradient(180deg,#fcf6ef 0%,#f5eadb 48%,#f1e4d3 100%);font-family:"Hiragino Sans GB","Microsoft YaHei",sans-serif;padding:20px}.wrap{display:flex;flex-direction:column;align-items:center;gap:18px}.phone{width:320px;border:3px solid #3a3a3a;border-radius:36px;background:#fffdf8;overflow:hidden;box-shadow:0 24px 60px rgba(95,53,30,.18);position:relative}.status-bar{height:32px;background:#3a3a3a;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.nav-bar{height:44px;background:#fffdf8;border-bottom:1px solid rgba(83,48,29,.08);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#3f261b}.content{padding:14px 14px 65px;overflow-y:auto;height:540px;font-size:12px}.summary-hero{background:linear-gradient(135deg,#fff8f0,#fef3e7);border-radius:14px;padding:16px;border:1px solid rgba(203,111,63,.1);text-align:center;margin-bottom:10px}.summary-hero .week{font-size:11px;color:#7d5d4d}.summary-hero .score{font-size:40px;font-weight:700;color:#9f4f2f;font-family:"Noto Serif SC","Songti SC",serif;margin:4px 0}.summary-hero .score-sub{font-size:11px;color:#7d5d4d}.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}.stat-item{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid rgba(83,48,29,.06)}.stat-item .val{font-size:22px;font-weight:700;color:#3f261b}.stat-item .val.up{color:#486b4d}.stat-item .label{font-size:10px;color:#7d5d4d;margin-top:2px}.highlight-card{background:#fff;border-radius:12px;padding:14px;border:1px solid rgba(83,48,29,.06);margin-bottom:8px;display:flex;gap:10px;align-items:center}.highlight-card .h-icon{font-size:24px;flex-shrink:0}.highlight-card .h-body{flex:1}.highlight-card .h-title{font-size:12px;font-weight:700;margin-bottom:2px}.highlight-card .h-desc{font-size:10px;color:#7d5d4d;line-height:1.5}.next-box{background:linear-gradient(135deg,#f0f7f1,#e8f3e9);border-radius:12px;padding:14px;border:1px solid rgba(72,107,77,.1);margin-top:10px}.next-box h4{font-size:12px;font-weight:700;color:#486b4d;margin-bottom:6px}.next-box p{font-size:11px;color:#7d5d4d;line-height:1.6}.tab-bar{display:flex;border-top:1px solid rgba(83,48,29,.08);padding:6px 0 4px;background:#fff;position:absolute;bottom:0;left:0;right:0}.tab-item{flex:1;text-align:center;font-size:10px;color:#7d5d4d}.tab-item.active{color:#cb6f3f;font-weight:700}.tab-icon{font-size:18px;display:block;margin-bottom:1px}.ftitle{font-family:"Noto Serif SC","Songti SC",serif;font-size:18px;color:#3f261b;text-align:center}.fdesc{font-size:13px;color:#7d5d4d;text-align:center;max-width:320px;line-height:1.6}.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;background:#cb6f3f;color:#fff;border:none;margin-top:6px;transition:opacity .18s}.export-btn:hover{opacity:.85}.export-btn.loading{pointer-events:none;opacity:.7}</style></head><body><div class="wrap"><div class="phone"><div class="status-bar"><span>9:41</span><span>100%</span></div><div class="nav-bar">每周成长总结</div><div class="content"><div class="summary-hero"><div class="week">6月16日 - 6月22日</div><div class="score">85</div><div class="score-sub">本周综合成长分 · 较上周 +6</div></div><div class="stat-row"><div class="stat-item"><div class="val up">5</div><div class="label">训练完成天数</div></div><div class="stat-item"><div class="val up">12</div><div class="label">打卡总次数</div></div><div class="stat-item"><div class="val">3</div><div class="label">新解锁技能</div></div><div class="stat-item"><div class="val up">+6</div><div class="label">较上周提升</div></div></div><div class="highlight-card"><div class="h-icon">🌟</div><div class="h-body"><div class="h-title">本周高光时刻</div><div class="h-desc">周三第一次独立完成睡前复述，从"妈妈陪我"到"我来说"，主动表达有了明显进步</div></div></div><div class="highlight-card"><div class="h-icon">📈</div><div class="h-body"><div class="h-title">进步最明显</div><div class="h-desc">语言表达从68提升到75。睡前复述练习连续做了5天，效果出来了</div></div></div><div class="next-box"><h4>下周建议重点</h4><p>继续保持睡前复述练习。新增一个"饭桌上说一件今天的事"小练习，把表达从睡前扩展到饭桌场景。</p></div></div><div class="tab-bar"><div class="tab-item"><span class="tab-icon">🏠</span>首页</div><div class="tab-item"><span class="tab-icon">📊</span>总结</div><div class="tab-item active"><span class="tab-icon">👤</span>我的</div></div></div><div class="ftitle">周报详情页</div><div class="fdesc">每周自动生成成长总结：得分变化、高光时刻、进步方向、下周建议，一目了然</div><button class="export-btn" onclick="exportImage()" id="exportBtn">↓ 导出图片</button></div><script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script><script>async function exportImage(){const b=document.getElementById("exportBtn");b.textContent="... 生成中";b.classList.add("loading");try{const c=await html2canvas(document.querySelector(".phone"),{scale:2,backgroundColor:"#fffdf8",onclone:function(d){const c=d.querySelector(".content");if(c){c.style.height="auto";c.style.overflow="visible"}}});const a=document.createElement("a");a.download="每周成长总结.png";a.href=c.toDataURL("image/png");a.click();b.textContent="↓ 导出图片";b.classList.remove("loading")}catch(e){b.textContent="导出失败";b.classList.remove("loading")}}</script></body></html>
