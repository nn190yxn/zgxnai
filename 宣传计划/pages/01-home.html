<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小牛育儿AI助理 - 首页聚合</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  display:flex; justify-content:center; align-items:center; min-height:100vh;
  background: radial-gradient(circle at top left, rgba(255,214,180,0.8), transparent 28%),
              radial-gradient(circle at top right, rgba(255,236,190,0.7), transparent 22%),
              linear-gradient(180deg, #fcf6ef 0%, #f5eadb 48%, #f1e4d3 100%);
  font-family: "Hiragino Sans GB", "Microsoft YaHei", sans-serif; padding:20px;
}
.wrap { display:flex; flex-direction:column; align-items:center; gap:18px; }
.phone {
  width:320px; border:3px solid #3a3a3a; border-radius:36px; background:#fffdf8; overflow:hidden;
  box-shadow:0 24px 60px rgba(95,53,30,0.18); position:relative;
}
.status-bar { height:32px; background:#3a3a3a; color:#fff; font-size:10px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; }
.nav-bar { height:44px; background:#fffdf8; border-bottom:1px solid rgba(83,48,29,0.08); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#3f261b; }
.content { padding:14px 14px 50px; overflow-y:auto; height:540px; font-size:12px; }
.tab-bar { display:flex; border-top:1px solid rgba(83,48,29,0.08); padding:6px 0 4px; background:#fff; position:absolute; bottom:0; left:0; right:0; }
.tab-item { flex:1; text-align:center; font-size:10px; color:#7d5d4d; }
.tab-item.active { color:#cb6f3f; font-weight:700; }
.tab-icon { font-size:18px; display:block; margin-bottom:1px; }
.card { background:#fff; border-radius:14px; padding:14px; border:1px solid rgba(83,48,29,0.06); margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
.card-hero { background:linear-gradient(135deg,#fff8f0,#fef3e7); border-radius:14px; padding:16px; border:1px solid rgba(203,111,63,0.1); margin-bottom:10px; }
.card-hero .title { font-size:18px; font-weight:700; color:#9f4f2f; margin-bottom:4px; }
.card-hero .sub { font-size:11px; color:#7d5d4d; margin-bottom:12px; }
.btn-primary { display:inline-flex; align-items:center; justify-content:center; background:#cb6f3f; color:#fff; border-radius:20px; padding:7px 18px; font-size:12px; font-weight:600; border:none; }
.btn-outline { display:inline-flex; align-items:center; justify-content:center; background:transparent; color:#cb6f3f; border:1.5px solid #cb6f3f; border-radius:20px; padding:7px 18px; font-size:12px; font-weight:600; }
.icon-row { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
.icon-item { background:#fff; border-radius:12px; padding:10px 8px; text-align:center; border:1px solid rgba(83,48,29,0.05); }
.icon-item .ico { font-size:20px; margin-bottom:3px; }
.icon-item .label { font-size:10px; color:#3f261b; font-weight:600; }
.icon-item .hint { font-size:9px; color:#7d5d4d; }
.ftitle { font-family:"Noto Serif SC","Songti SC",serif; font-size:18px; color:#3f261b; text-align:center; }
.fdesc { font-size:13px; color:#7d5d4d; text-align:center; max-width:320px; line-height:1.6; }
.export-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 20px; border-radius:99px; font-size:12px; font-weight:600; cursor:pointer;
  background:var(--accent, #cb6f3f); color:#fff; border:none;
  margin-top:6px; transition: opacity .18s;
}
.export-btn:hover { opacity:.85; }
.export-btn.loading { pointer-events:none; opacity:.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>100%</span></div>
    <div class="nav-bar">小牛育儿AI助理</div>
    <div class="content">
      <div class="card-hero">
        <div class="title">小牛育儿AI助理</div>
        <div class="sub">看懂孩子当前成长短板，少走弯路</div>
        <div style="display:flex; gap:8px;">
          <div class="btn-primary">开始观察</div>
          <div class="btn-outline">问问AI助理</div>
        </div>
      </div>
      <div class="card">
        <div style="font-weight:700; font-size:13px;">今日成长重点</div>
        <div style="color:#7d5d4d; font-size:11px; margin-top:3px;">专注力训练 · 约3分钟 · 基于5-6岁</div>
      </div>
      <div class="icon-row">
        <div class="icon-item"><div class="ico">&#x1F50D;</div><div class="label">成长观察</div><div class="hint">了解近期状态</div></div>
        <div class="icon-item"><div class="ico">&#x1F4DA;</div><div class="label">每日训练</div><div class="hint">今天练什么</div></div>
        <div class="icon-item"><div class="ico">&#x1F372;</div><div class="label">营养食谱</div><div class="hint">饮食搭配参考</div></div>
        <div class="icon-item"><div class="ico">&#x1F4D6;</div><div class="label">育儿锦囊</div><div class="hint">问题找方法</div></div>
        <div class="icon-item"><div class="ico">&#x1F4AC;</div><div class="label">AI育儿问答</div><div class="hint">获取建议</div></div>
        <div class="icon-item"><div class="ico">&#x1F4DD;</div><div class="label">成长记录</div><div class="hint">记录变化</div></div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-item active"><span class="tab-icon">&#x1F3E0;</span>首页</div>
      <div class="tab-item"><span class="tab-icon">&#x1F4AC;</span>AI问答</div>
      <div class="tab-item"><span class="tab-icon">&#x1F464;</span>我的</div>
    </div>
  </div>
  <div class="ftitle">首页聚合</div>
  <div class="fdesc">一站式入口，覆盖成长观察、每日训练、AI问答等全部育儿功能，根据孩子年龄智能推荐</div>
  <button class="export-btn" onclick="exportImage()" id="exportBtn">↓ 导出图片</button>
</div>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
async function exportImage() {
  const btn=document.getElementById("exportBtn");
  btn.textContent="... 生成中"; btn.classList.add("loading");
  try {
    const el=document.querySelector(".phone");
    const canvas=await html2canvas(el,{scale:2,backgroundColor:"#fffdf8",onclone:function(d){const c=d.querySelector(".content");if(c){c.style.height="auto";c.style.overflow="visible"}}});
    const a=document.createElement("a");
    a.download="首页聚合.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    btn.textContent="↓ 导出图片"; btn.classList.remove("loading");
  } catch(e) {
    btn.textContent="导出失败，请重试"; btn.classList.remove("loading");
  }
}
</script>
</body>
</html>
