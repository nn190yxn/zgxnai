<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" /><title>成长趋势图表</title><style>*{box-sizing:border-box;margin:0;padding:0}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(circle at top left,rgba(255,214,180,.8),transparent 28%),radial-gradient(circle at top right,rgba(255,236,190,.7),transparent 22%),linear-gradient(180deg,#fcf6ef 0%,#f5eadb 48%,#f1e4d3 100%);font-family:"Hiragino Sans GB","Microsoft YaHei",sans-serif;padding:20px}.wrap{display:flex;flex-direction:column;align-items:center;gap:18px}.phone{width:320px;border:3px solid #3a3a3a;border-radius:36px;background:#fffdf8;overflow:hidden;box-shadow:0 24px 60px rgba(95,53,30,.18);position:relative}.status-bar{height:32px;background:#3a3a3a;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.nav-bar{height:44px;background:#fffdf8;border-bottom:1px solid rgba(83,48,29,.08);display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:13px;font-weight:700;color:#3f261b}.content{padding:14px 14px 65px;overflow-y:auto;height:540px;font-size:12px}.period-tabs{display:flex;gap:6px;margin-bottom:14px}.period-tab{padding:6px 16px;border-radius:99px;font-size:11px;font-weight:600;background:#fff;border:1px solid rgba(83,48,29,.08);color:#7d5d4d;text-align:center;flex:1}.period-tab.active{background:#cb6f3f;color:#fff;border-color:#cb6f3f}.chart-area{background:#fff;border-radius:14px;padding:16px;border:1px solid rgba(83,48,29,.06)}.chart-title{font-size:13px;font-weight:700;margin-bottom:4px}.chart-sub{font-size:10px;color:#7d5d4d;margin-bottom:14px}.bars{display:flex;align-items:flex-end;gap:6px;height:120px;margin-bottom:10px}.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}.bar-col .bar{width:100%;border-radius:8px 8px 0 0;transition:height .5s}.bar-col .bar.c1{background:linear-gradient(180deg,#f4b487,#cb6f3f)}.bar-col .bar.c2{background:linear-gradient(180deg,#86b38a,#486b4d)}.bar-col .bar.c3{background:linear-gradient(180deg,#d4a84b,#b8860b)}.bar-col .bar.c4{background:linear-gradient(180deg,#c4a6e0,#7b5ea7)}.bar-col .label{font-size:9px;color:#7d5d4d}.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#7d5d4d}.legend-dot{width:8px;height:8px;border-radius:50%}.legend-dot.l1{background:#cb6f3f}.legend-dot.l2{background:#486b4d}.legend-dot.l3{background:#b8860b}.legend-dot.l4{background:#7b5ea7}.summary-box{background:linear-gradient(135deg,#fff8f0,#fef3e7);border-radius:12px;padding:14px;margin-top:10px;border:1px solid rgba(203,111,63,.1)}.summary-box h4{font-size:12px;font-weight:700;color:#9f4f2f;margin-bottom:6px}.summary-box p{font-size:11px;color:#7d5d4d;line-height:1.6}.tab-bar{display:flex;border-top:1px solid rgba(83,48,29,.08);padding:6px 0 4px;background:#fff;position:absolute;bottom:0;left:0;right:0}.tab-item{flex:1;text-align:center;font-size:10px;color:#7d5d4d}.tab-item.active{color:#cb6f3f;font-weight:700}.tab-icon{font-size:18px;display:block;margin-bottom:1px}.ftitle{font-family:"Noto Serif SC","Songti SC",serif;font-size:18px;color:#3f261b;text-align:center}.fdesc{font-size:13px;color:#7d5d4d;text-align:center;max-width:320px;line-height:1.6}.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;background:#cb6f3f;color:#fff;border:none;margin-top:6px;transition:opacity .18s}.export-btn:hover{opacity:.85}.export-btn.loading{pointer-events:none;opacity:.7}</style></head><body><div class="wrap"><div class="phone"><div class="status-bar"><span>9:41</span><span>100%</span></div><div class="nav-bar"><span>← 返回</span><span>成长趋势</span><span></span></div><div class="content"><div class="period-tabs"><div class="period-tab">周</div><div class="period-tab active">月</div><div class="period-tab">季</div></div><div class="chart-area"><div class="chart-title">专注力月度变化</div><div class="chart-sub">最近4周对比 · 5岁男孩</div><div class="bars"><div class="bar-col"><div class="bar c1" style="height:55%"></div><div class="label">第1周</div></div><div class="bar-col"><div class="bar c1" style="height:62%"></div><div class="label">第2周</div></div><div class="bar-col"><div class="bar c1" style="height:70%"></div><div class="label">第3周</div></div><div class="bar-col"><div class="bar c1" style="height:78%"></div><div class="label">本周</div></div></div><div class="legend"><div class="legend-item"><div class="legend-dot l1"></div>专注力</div><div class="legend-item"><div class="legend-dot l2"></div>表达力</div><div class="legend-item"><div class="legend-dot l3"></div>社交</div><div class="legend-item"><div class="legend-dot l4"></div>运动</div></div></div><div class="summary-box"><h4>本月变化小结</h4><p>专注力从55升到78，进步最大。<br>表达力稳定在70左右，建议下周增加睡前复述练习。<br>社交有波动但整体上升。<br><br>继续坚持每天10分钟训练，进步看得见。</p></div></div><div class="tab-bar"><div class="tab-item"><span class="tab-icon">🏠</span>首页</div><div class="tab-item active"><span class="tab-icon">📈</span>记录</div><div class="tab-item"><span class="tab-icon">👤</span>我的</div></div></div><div class="ftitle">成长趋势图表</div><div class="fdesc">每周记录自动生成趋势图，家长一眼看到孩子哪里在进步、哪里要关注</div><button class="export-btn" onclick="exportImage()" id="exportBtn">↓ 导出图片</button></div><script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script><script>async function exportImage(){const b=document.getElementById("exportBtn");b.textContent="... 生成中";b.classList.add("loading");try{const c=await html2canvas(document.querySelector(".phone"),{scale:2,backgroundColor:"#fffdf8"});const a=document.createElement("a");a.download="成长趋势图表.png";a.href=c.toDataURL("image/png");a.click();b.textContent="↓ 导出图片";b.classList.remove("loading")}catch(e){b.textContent="导出失败";b.classList.remove("loading")}}</script></body></html>
