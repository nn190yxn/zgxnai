<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小牛育儿AI助理 - 每日训练</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  display:flex; justify-content:center; align-items:center; min-height:100vh;
  background: radial-gradient(circle at top left, rgba(255,214,180,0.8), transparent 28%),
              radial-gradient(circle at top right, rgba(255,236,190,0.7), transparent 22%),
              linear-gradient(180deg, #fcf6ef 0%, #f5eadb 48%, #f1e4d3 100%);
  font-family: "Hiragino Sans GB", "Microsoft YaHei", sans-serif; padding:20px;
}
.wrap { display:flex; flex-direction:column; align-items:center; gap:18px; }
.phone {
  width:320px; border:3px solid #3a3a3a; border-radius:36px; background:#fffdf8; overflow:hidden;
  box-shadow:0 24px 60px rgba(95,53,30,0.18); position:relative;
}
.status-bar { height:32px; background:#3a3a3a; color:#fff; font-size:10px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; }
.nav-bar { height:44px; background:#fffdf8; border-bottom:1px solid rgba(83,48,29,0.08); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#3f261b; position:relative; }
.nav-bar .back { position:absolute; left:12px; font-size:12px; color:#cb6f3f; }
.content { padding:14px 14px 50px; overflow-y:auto; height:540px; font-size:12px; }
.tab-bar { display:flex; border-top:1px solid rgba(83,48,29,0.08); padding:6px 0 4px; background:#fff; position:absolute; bottom:0; left:0; right:0; }
.tab-item { flex:1; text-align:center; font-size:10px; color:#7d5d4d; }
.tab-item.active { color:#cb6f3f; font-weight:700; }
.tab-icon { font-size:18px; display:block; margin-bottom:1px; }
.card { background:#fff; border-radius:14px; padding:14px; border:1px solid rgba(83,48,29,0.06); margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
.card-hero { background:linear-gradient(135deg,#f5fdf7,#eafaf1); border-radius:14px; padding:16px; border:1px solid rgba(72,107,77,0.12); margin-bottom:10px; }
.chip { display:inline-flex; align-items:center; background:rgba(203,111,63,0.1); color:#9f4f2f; border-radius:12px; padding:3px 8px; font-size:10px; font-weight:600; margin-bottom:6px; }
.chip-blue { background:rgba(116,185,255,0.15); color:#2d6a9f; }
.chip-green { background:rgba(72,107,77,0.1); color:#486b4d; }
.btn-primary { display:inline-flex; align-items:center; justify-content:center; background:#cb6f3f; color:#fff; border-radius:20px; padding:8px 20px; font-size:12px; font-weight:600; border:none; }
.btn-outline { display:inline-flex; align-items:center; justify-content:center; background:transparent; color:#cb6f3f; border:1.5px solid #cb6f3f; border-radius:20px; padding:8px 20px; font-size:12px; font-weight:600; }
.ftitle { font-family:"Noto Serif SC","Songti SC",serif; font-size:18px; color:#3f261b; text-align:center; }
.fdesc { font-size:13px; color:#7d5d4d; text-align:center; max-width:320px; line-height:1.6; }

.export-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 20px; border-radius:99px; font-size:12px; font-weight:600; cursor:pointer;
  background:var(--accent, #cb6f3f); color:#fff; border:none;
  margin-top:6px; transition: opacity .18s;
}
.export-btn:hover { opacity:.85; }
.export-btn.loading { pointer-events:none; opacity:.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>100%</span></div>
    <div class="nav-bar"><span class="back">&larr; 返回</span>每日训练</div>
    <div class="content">
      <div class="card-hero">
        <div style="font-size:15px; font-weight:700; color:#3f261b;">今天带娃练什么？</div>
        <div style="font-size:11px; color:#7d5d4d; margin-top:4px;">基于5-6岁年龄段 · 每天10分钟亲子练习</div>
      </div>
      <div class="card">
        <span class="chip">阅读理解</span>
        <div style="font-weight:700; font-size:13px; margin-top:4px;">亲子共读提问练习</div>
        <div style="font-size:10px; color:#7d5d4d; margin-top:3px;">从看图走向理解，练习用三个问题引导孩子表达</div>
        <div style="margin-top:6px; font-size:10px; color:#486b4d;">难度: 入门 · 约8分钟</div>
      </div>
      <div class="card">
        <span class="chip chip-blue">表达沟通</span>
        <div style="font-weight:700; font-size:13px; margin-top:4px;">三点汇报训练</div>
        <div style="font-size:10px; color:#7d5d4d; margin-top:3px;">把重点分成三句说：先讲发生什么，再说为什么重要，最后说想法</div>
        <div style="margin-top:6px; font-size:10px; color:#486b4d;">难度: 初级 · 约10分钟</div>
      </div>
      <div class="card">
        <span class="chip chip-green">学习习惯</span>
        <div style="font-weight:700; font-size:13px; margin-top:4px;">专注力入门练习</div>
        <div style="font-size:10px; color:#7d5d4d; margin-top:3px;">从5分钟安静活动开始，逐步建立任务坚持感</div>
        <div style="margin-top:6px; font-size:10px; color:#486b4d;">难度: 入门 · 约5分钟</div>
      </div>
      <div style="margin-top:12px; display:flex; gap:8px;">
        <div class="btn-outline" style="flex:1; text-align:center; font-size:11px;">知识章节</div>
        <div class="btn-primary" style="flex:1; text-align:center; font-size:11px;">开始训练</div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-item active"><span class="tab-icon">&#x1F3E0;</span>首页</div>
      <div class="tab-item"><span class="tab-icon">&#x1F4AC;</span>AI问答</div>
      <div class="tab-item"><span class="tab-icon">&#x1F464;</span>我的</div>
    </div>
  </div>
  <div class="ftitle">每日训练</div>
  <div class="fdesc">分龄的知识章节学习和每日亲子训练任务，涵盖阅读理解、表达沟通、逻辑思维和学习习惯，每天10分钟</div>
  <button class="export-btn" onclick="exportImage()" id="exportBtn">↓ 导出图片</button>
</div>

<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
async function exportImage() {
  const btn=document.getElementById("exportBtn");
  btn.textContent="... 生成中"; btn.classList.add("loading");
  try {
    const el=document.querySelector(".phone");
    const canvas=await html2canvas(el,{scale:2,backgroundColor:"#fffdf8",onclone:function(d){const c=d.querySelector(".content");if(c){c.style.height="auto";c.style.overflow="visible"}}});
    const a=document.createElement("a");
    a.download="每日训练.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    btn.textContent="↓ 导出图片"; btn.classList.remove("loading");
  } catch(e) {
    btn.textContent="导出失败，请重试"; btn.classList.remove("loading");
  }
}
</script>
</body>

</html>
