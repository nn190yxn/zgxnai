<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小牛育儿AI助理 - 营养食谱</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  display:flex; justify-content:center; align-items:center; min-height:100vh;
  background: radial-gradient(circle at top left, rgba(255,214,180,0.8), transparent 28%),
              radial-gradient(circle at top right, rgba(255,236,190,0.7), transparent 22%),
              linear-gradient(180deg, #fcf6ef 0%, #f5eadb 48%, #f1e4d3 100%);
  font-family: "Hiragino Sans GB", "Microsoft YaHei", sans-serif; padding:20px;
}
.wrap { display:flex; flex-direction:column; align-items:center; gap:18px; }
.phone {
  width:320px; border:3px solid #3a3a3a; border-radius:36px; background:#fffdf8; overflow:hidden;
  box-shadow:0 24px 60px rgba(95,53,30,0.18); position:relative;
}
.status-bar { height:32px; background:#3a3a3a; color:#fff; font-size:10px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; }
.nav-bar { height:44px; background:#fffdf8; border-bottom:1px solid rgba(83,48,29,0.08); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#3f261b; position:relative; }
.nav-bar .back { position:absolute; left:12px; font-size:12px; color:#cb6f3f; }
.content { padding:14px 14px 50px; overflow-y:auto; height:540px; font-size:12px; }
.tab-bar { display:flex; border-top:1px solid rgba(83,48,29,0.08); padding:6px 0 4px; background:#fff; position:absolute; bottom:0; left:0; right:0; }
.tab-item { flex:1; text-align:center; font-size:10px; color:#7d5d4d; }
.tab-item.active { color:#cb6f3f; font-weight:700; }
.tab-icon { font-size:18px; display:block; margin-bottom:1px; }
.card { background:#fff; border-radius:14px; padding:14px; border:1px solid rgba(83,48,29,0.06); margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
.card-hero { background:linear-gradient(135deg,#fffaf0,#fff5e6); border-radius:14px; padding:16px; border:1px solid rgba(203,111,63,0.1); margin-bottom:10px; }
.chip { display:inline-flex; align-items:center; background:rgba(203,111,63,0.1); color:#9f4f2f; border-radius:12px; padding:3px 8px; font-size:10px; font-weight:600; }
.chip-green { background:rgba(72,107,77,0.1); color:#486b4d; }
.ftitle { font-family:"Noto Serif SC","Songti SC",serif; font-size:18px; color:#3f261b; text-align:center; }
.fdesc { font-size:13px; color:#7d5d4d; text-align:center; max-width:320px; line-height:1.6; }

.export-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 20px; border-radius:99px; font-size:12px; font-weight:600; cursor:pointer;
  background:var(--accent, #cb6f3f); color:#fff; border:none;
  margin-top:6px; transition: opacity .18s;
}
.export-btn:hover { opacity:.85; }
.export-btn.loading { pointer-events:none; opacity:.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>100%</span></div>
    <div class="nav-bar"><span class="back">&larr; 返回</span>营养食谱</div>
    <div class="content">
      <div class="card-hero">
        <div style="font-size:15px; font-weight:700; color:#3f261b;">分龄饮食搭配参考</div>
        <div style="font-size:11px; color:#7d5d4d; margin-top:4px;">按孩子年龄段推荐营养均衡的三餐搭配</div>
        <div style="display:flex; gap:6px; margin-top:10px;">
          <span class="chip">1-3岁</span><span class="chip" style="opacity:0.4;">3-6岁</span><span class="chip" style="opacity:0.4;">6-12岁</span>
        </div>
      </div>
      <div class="card">
        <div style="display:flex; gap:10px;">
          <div style="width:56px; height:56px; background:#ffeaa7; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px;">&#x1F95E;</div>
          <div style="flex:1;">
            <div style="font-weight:700; font-size:13px;">软香南瓜小米粥</div>
            <div style="font-size:10px; color:#7d5d4d;">软烂质地，稳定吞咽，基础咀嚼过渡</div>
            <span class="chip-green" style="font-size:9px;">早餐</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div style="display:flex; gap:10px;">
          <div style="width:56px; height:56px; background:#dfe6e9; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px;">&#x1F969;</div>
          <div style="flex:1;">
            <div style="font-weight:700; font-size:13px;">蔬菜鸡肉泥</div>
            <div style="font-size:10px; color:#7d5d4d;">蛋白质和蔬菜搭配，补充铁和维生素</div>
            <span class="chip-green" style="font-size:9px;">午餐</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div style="display:flex; gap:10px;">
          <div style="width:56px; height:56px; background:#fab1a0; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px;">&#x1F35C;</div>
          <div style="flex:1;">
            <div style="font-weight:700; font-size:13px;">番茄鱼片粥</div>
            <div style="font-size:10px; color:#7d5d4d;">软嫩鱼类搭配番茄，口感温和易接受</div>
            <span class="chip-green" style="font-size:9px;">晚餐</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div style="font-size:12px; font-weight:700; margin-bottom:4px;">营养要点</div>
        <div style="font-size:10px; color:#7d5d4d; line-height:1.7;">规律进餐和营养均衡 · 先稳住三餐节奏再微调 · 避免零食占掉正餐空间</div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-item active"><span class="tab-icon">&#x1F3E0;</span>首页</div>
      <div class="tab-item"><span class="tab-icon">&#x1F4AC;</span>AI问答</div>
      <div class="tab-item"><span class="tab-icon">&#x1F464;</span>我的</div>
    </div>
  </div>
  <div class="ftitle">营养食谱</div>
  <div class="fdesc">分龄食谱推荐，覆盖早餐到晚餐三顿搭配，按孩子年龄段给出食材搭配和营养要点，做饭更省心</div>
  <button class="export-btn" onclick="exportImage()" id="exportBtn">↓ 导出图片</button>
</div>

<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
async function exportImage() {
  const btn=document.getElementById("exportBtn");
  btn.textContent="... 生成中"; btn.classList.add("loading");
  try {
    const el=document.querySelector(".phone");
    const canvas=await html2canvas(el,{scale:2,backgroundColor:"#fffdf8",onclone:function(d){const c=d.querySelector(".content");if(c){c.style.height="auto";c.style.overflow="visible"}}});
    const a=document.createElement("a");
    a.download="营养食谱.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    btn.textContent="↓ 导出图片"; btn.classList.remove("loading");
  } catch(e) {
    btn.textContent="导出失败，请重试"; btn.classList.remove("loading");
  }
}
</script>
</body>

</html>
