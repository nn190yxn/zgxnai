<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" /><title>成长观察 - 测评结果报告</title><style>*{box-sizing:border-box;margin:0;padding:0}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(circle at top left,rgba(255,214,180,.8),transparent 28%),radial-gradient(circle at top right,rgba(255,236,190,.7),transparent 22%),linear-gradient(180deg,#fcf6ef 0%,#f5eadb 48%,#f1e4d3 100%);font-family:"Hiragino Sans GB","Microsoft YaHei",sans-serif;padding:20px}.wrap{display:flex;flex-direction:column;align-items:center;gap:18px}.phone{width:320px;border:3px solid #3a3a3a;border-radius:36px;background:#fffdf8;overflow:hidden;box-shadow:0 24px 60px rgba(95,53,30,.18);position:relative}.status-bar{height:32px;background:#3a3a3a;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.nav-bar{height:44px;background:#fffdf8;border-bottom:1px solid rgba(83,48,29,.08);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#3f261b}.content{padding:14px 14px 65px;overflow-y:auto;height:540px;font-size:12px}.score-card{background:linear-gradient(135deg,#fff8f0,#fef3e7);border-radius:14px;padding:16px;border:1px solid rgba(203,111,63,.1);text-align:center;margin-bottom:10px}.score-big{font-size:36px;font-weight:700;color:#9f4f2f;font-family:"Noto Serif SC","Songti SC",serif}.score-label{font-size:11px;color:#7d5d4d;margin-top:2px}.score-tag{display:inline-block;padding:4px 14px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(203,111,63,.1);color:var(--accent,#cb6f3f);margin-top:6px}.bar-item{margin-bottom:10px}.bar-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}.bar-head .name{font-weight:600}.bar-head .val{color:#7d5d4d}.bar-track{height:8px;border-radius:99px;background:rgba(0,0,0,.05);overflow:hidden}.bar-fill{height:100%;border-radius:99px}.bar-fill.high{background:linear-gradient(90deg,#f4b487,#cb6f3f)}.bar-fill.mid{background:linear-gradient(90deg,#86b38a,#486b4d)}.bar-fill.low{background:linear-gradient(90deg,#d4a84b,#b8860b)}.tip-box{background:#fff;border-radius:12px;padding:14px;border:1px solid rgba(83,48,29,.06);margin-top:10px}.tip-box .tip-title{font-size:12px;font-weight:700;margin-bottom:6px;color:#9f4f2f}.tip-box .tip-text{font-size:11px;color:#7d5d4d;line-height:1.6}.tab-bar{display:flex;border-top:1px solid rgba(83,48,29,.08);padding:6px 0 4px;background:#fff;position:absolute;bottom:0;left:0;right:0}.tab-item{flex:1;text-align:center;font-size:10px;color:#7d5d4d}.tab-item.active{color:#cb6f3f;font-weight:700}.tab-icon{font-size:18px;display:block;margin-bottom:1px}.ftitle{font-family:"Noto Serif SC","Songti SC",serif;font-size:18px;color:#3f261b;text-align:center}.fdesc{font-size:13px;color:#7d5d4d;text-align:center;max-width:320px;line-height:1.6}.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;background:#cb6f3f;color:#fff;border:none;margin-top:6px;transition:opacity .18s}.export-btn:hover{opacity:.85}.export-btn.loading{pointer-events:none;opacity:.7}</style></head><body><div class="wrap"><div class="phone"><div class="status-bar"><span>9:41</span><span>100%</span></div><div class="nav-bar">成长观察 · 测评结果</div><div class="content"><div class="score-card"><div class="score-label">综合发展指数</div><div class="score-big">78</div><div class="score-tag">同龄前 30%</div></div><div class="bar-item"><div class="bar-head"><span class="name">专注力</span><span class="val">85</span></div><div class="bar-track"><div class="bar-fill high" style="width:85%"></div></div></div><div class="bar-item"><div class="bar-head"><span class="name">语言表达</span><span class="val">72</span></div><div class="bar-track"><div class="bar-fill mid" style="width:72%"></div></div></div><div class="bar-item"><div class="bar-head"><span class="name">运动协调</span><span class="val">80</span></div><div class="bar-track"><div class="bar-fill high" style="width:80%"></div></div></div><div class="bar-item"><div class="bar-head"><span class="name">社交情绪</span><span class="val">68</span></div><div class="bar-track"><div class="bar-fill low" style="width:68%"></div></div></div><div class="tip-box"><div class="tip-title">当前短板：表达力</div><div class="tip-text">孩子知道却说不出来，很多时候是复述能力还在发展中。建议每天晚饭后花10分钟，用"今天最开心的一件事"做亲子对话练习。</div></div><div class="tip-box" style="margin-top:6px"><div class="tip-title">本周建议</div><div class="tip-text">先抓表达和社交两个方向。每天10分钟亲子对话 + 周末安排一次小伙伴互动。</div></div></div><div class="tab-bar"><div class="tab-item"><span class="tab-icon">🏠</span>首页</div><div class="tab-item active"><span class="tab-icon">🔍</span>观察</div><div class="tab-item"><span class="tab-icon">👤</span>我的</div></div></div><div class="ftitle">测评结果报告</div><div class="fdesc">四项能力雷达 + 短板定位 + 个性化建议，家长一眼看清孩子当前卡在哪</div><button class="export-btn" onclick="exportImage()" id="exportBtn">↓ 导出图片</button></div><script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script><script>async function exportImage(){const b=document.getElementById("exportBtn");b.textContent="... 生成中";b.classList.add("loading");try{const c=await html2canvas(document.querySelector(".phone"),{scale:2,backgroundColor:"#fffdf8",onclone:function(d){const c=d.querySelector(".content");if(c){c.style.height="auto";c.style.overflow="visible"}}});const a=document.createElement("a");a.download="测评结果报告.png";a.href=c.toDataURL("image/png");a.click();b.textContent="↓ 导出图片";b.classList.remove("loading")}catch(e){b.textContent="导出失败";b.classList.remove("loading")}}</script></body></html>
